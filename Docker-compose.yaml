
services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo

  frontend-blue:
    build: ./frontend-blue
    container_name: frontend-blue
    ports:
      - "3100:3100"
    environment:
      - PORT=3100

  frontend-green:
    build: ./frontend-green
    container_name: frontend-green
    ports:
      - "3200:3200"
    environment:
      - PORT=3200

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"